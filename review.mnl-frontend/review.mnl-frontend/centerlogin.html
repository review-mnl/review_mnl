<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Review Center Login - Review.Mnl</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <style>
            .login-page {
                min-height: 100vh;
                background-image: url(images/bg.png);
                background-position: center;
                background-size: cover;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            .login-page::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 67, 207, 0.3);
                z-index: 1;
            }

            .login-nav {
                padding: 2% 6%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: linear-gradient(rgba(0,0,0,0.2), transparent);
                position: relative;
                z-index: 2;
            }

            .login-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                position: relative;
                z-index: 2;
            }

            .login-form {
                background: #fff;
                border-radius: 20px;
                padding: 60px 50px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            }

            .login-form h1 {
                color: #0043CF;
                font-size: 21px;
                margin-bottom: 4px;
                font-weight: 600;
            }

            .login-form .center-badge {
                display: inline-block;
                background: #e8eeff;
                color: #0043CF;
                font-size: 10px;
                font-weight: 700;
                padding: 3px 10px;
                border-radius: 20px;
                margin-bottom: 10px;
                letter-spacing: 0.5px;
            }

            .login-form p {
                color: #666;
                font-size: 11px;
                margin-bottom: 30px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                color: #0043CF;
                font-weight: 500;
                margin-bottom: 8px;
                font-size: 10px;
            }

            .form-group input {
                width: 100%;
                padding: 9px 10px;
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                font-size: 11px;
                font-family: 'Poppins', sans-serif;
                transition: border-color 0.3s ease;
                box-sizing: border-box;
            }

            .form-group input:focus {
                outline: none;
                border-color: #0043CF;
            }

            .remember-forgot {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
                font-size: 11px;
            }

            .remember-forgot a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 500;
            }

            .remember-forgot a:hover { text-decoration: underline; }

            .login-btn {
                width: 100%;
                padding: 11px;
                background-color: #0043CF;
                color: #fff;
                border: none;
                border-radius: 50px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                font-family: 'Poppins', sans-serif;
                transition: background-color 0.3s ease;
                margin-bottom: 15px;
            }

            .login-btn:hover { background-color: #0035a3; }

            .signup-link {
                text-align: center;
                color: #666;
                font-size: 14px;
            }

            .signup-link a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 600;
            }

            .signup-link a:hover { text-decoration: underline; }
        </style>
    </head>
    <body>
        <div class="login-page">
            <nav class="login-nav">
                <a href="index.html" class="top-logo"><span class="logo-review">review</span><span class="logo-mnl">.mnl</span></a>
                <div></div>
            </nav>

            <div class="login-container">
                <form class="login-form" id="centerLoginForm">
                    <h1>Review Center Login</h1>
                    <span class="center-badge">REVIEW CENTER PORTAL</span>
                    <p>Access your center dashboard on review.mnl</p>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your center email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="remember-forgot">
                        <label>
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="forgotpassword.html">Forgot password?</a>
                    </div>

                    <p id="loginError" style="display:none;color:#d32f2f;font-size:11px;margin-bottom:10px;"></p>
                    <button type="submit" class="login-btn">LOGIN</button>

                    <div class="signup-link">
                        New review center? <a href="signup.html">Register here</a>
                    </div>
                    <div class="signup-link" style="margin-top:10px;">
                        Student? <a href="login.html">Login here</a>
                    </div>
                </form>
            </div>
        </div>
        <script src="api.js"></script>
        <script>
            document.getElementById('centerLoginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const email    = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const btn      = document.querySelector('.login-btn');
                const errEl    = document.getElementById('loginError');
                errEl.style.display = 'none';
                btn.disabled = true;
                btn.textContent = 'Logging in...';
                try {
                    const data = await AuthAPI.login(email, password);
                    const role = data.user.role;
                    if (role !== 'review_center' && role !== 'admin') {
                        errEl.textContent = role === 'superadmin'
                            ? 'Use the superadmin portal to log in.'
                            : 'This portal is for review centers only. Students use a separate login.';
                        errEl.style.display = 'block';
                        btn.disabled = false;
                        btn.textContent = 'LOGIN';
                        return;
                    }
                    saveSession(data);
                    window.location.href = 'admindashboard.html';
                } catch (err) {
                    errEl.textContent = err.message || 'Login failed. Please try again.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'LOGIN';
                }
            });
        </script>
    </body>
</html>
