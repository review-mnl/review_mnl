<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login - Review.Mnl</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <style>
            .login-page {
                min-height: 100vh;
                background-image: url(images/bg.png);
                background-position: center;
                background-size: cover;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            .login-page::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 67, 207, 0.3);
                z-index: 1;
            }

            .login-nav {
                padding: 2% 6%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: linear-gradient(rgba(0,0,0,0.2), transparent);
                position: relative;
                z-index: 2;
            }

            .login-nav img {
                width: 150px;
            }

            .login-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                position: relative;
                z-index: 2;
            }

            .login-form {
                background: #fff;
                border-radius: 20px;
                padding: 60px 50px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            }

            .login-form h1,
            .login-form h2 {
                color: #0043CF;
                font-size: 21px;
                margin-bottom: 10px;
                font-weight: 600;
            }

            .login-form p {
                color: #666;
                font-size: 11px;
                margin-bottom: 30px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                color: #0043CF;
                font-weight: 500;
                margin-bottom: 8px;
                font-size: 10px;
            }

            .form-group input {
                width: 100%;
                padding: 9px 10px;
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                font-size: 11px;
                font-family: 'Poppins', sans-serif;
                transition: border-color 0.3s ease;
                box-sizing: border-box;
            }

            .form-group input:focus {
                outline: none;
                border-color: #0043CF;
            }

            .remember-forgot {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
                font-size: 11px;
            }

            .remember-forgot a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 500;
            }

            .remember-forgot a:hover {
                text-decoration: underline;
            }

            .login-btn {
                width: 100%;
                padding: 11px;
                background-color: #0043CF;
                color: #fff;
                border: none;
                border-radius: 50px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                font-family: 'Poppins', sans-serif;
                transition: background-color 0.3s ease;
                margin-bottom: 15px;
            }

            .login-btn:hover {
                background-color: #0035a3;
            }

            .divider {
                display: flex;
                align-items: center;
                margin: 25px 0;
                color: #999;
            }

            .divider::before,
            .divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: #e0e0e0;
            }

            .divider span {
                margin: 0 10px;
                font-size: 13px;
            }

            .social-login {
                display: flex;
                gap: 15px;
                margin-bottom: 20px;
            }

            .social-btn {
                flex: 1;
                padding: 12px;
                border: 2px solid #e0e0e0;
                background: #f9f9f9;
                border-radius: 12px;
                cursor: pointer;
                font-size: 24px;
                transition: all 0.3s ease;
                font-family: 'Poppins', sans-serif;
            }

            .social-btn:hover {
                border-color: #0043CF;
                background: #f0f5ff;
            }

            .signup-link {
                text-align: center;
                color: #666;
                font-size: 14px;
            }

            .signup-link a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 600;
            }

            .signup-link a:hover {
                text-decoration: underline;
            }

            .role-tabs {
                display: flex;
                border-radius: 50px;
                background: #f0f4ff;
                padding: 4px;
                margin-bottom: 28px;
                gap: 4px;
            }

            .role-tab {
                flex: 1;
                padding: 9px 0;
                border: none;
                background: transparent;
                border-radius: 50px;
                font-family: 'Poppins', sans-serif;
                font-size: 11px;
                font-weight: 600;
                color: #888;
                cursor: pointer;
                transition: all 0.25s ease;
            }

            .role-tab.active {
                background: #0043CF;
                color: #fff;
                box-shadow: 0 2px 8px rgba(0,67,207,0.25);
            }
        </style>
    </head>
    <body>
        <div class="login-page">
            <nav class="login-nav">
                <a href="index.html" class="top-logo"><span class="logo-review">review</span><span class="logo-mnl">.mnl</span></a>
                <div></div>
            </nav>

            <div class="login-container">
                <form class="login-form" id="loginForm">
                    <h1>Login</h1>
                    <p>Welcome back to review.mnl</p>

                    <div class="role-tabs">
                        <button type="button" class="role-tab active" onclick="switchRole('student', this)">Student</button>
                        <button type="button" class="role-tab" onclick="switchRole('admin', this)">Review Center</button>
                    </div>
                    <input type="hidden" id="loginRole" name="role" value="student">

                    <div class="social-login">
                        <button type="button" class="social-btn" title="Login with Google"><i class="fab fa-google"></i></button>
                        <button type="button" class="social-btn" title="Login with Facebook"><i class="fab fa-facebook-f"></i></button>
                    </div>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="remember-forgot">
                        <label>
                            <input type="checkbox" name="remember"> Remember me
                        </label>
                        <a href="forgotpassword.html">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn">LOGIN</button>

                    <div class="signup-link">
                        Don't have an account? <a href="signup.html">Sign up here</a>
                    </div>
                </form>
            </div>
        </div>
        <script>
            function switchRole(role, btn) {
                document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('loginRole').value = role;
            }

            document.getElementById('loginForm').addEventListener('submit', function(e) {
                e.preventDefault();
                const role = document.getElementById('loginRole').value;
                localStorage.setItem('rmnl_role', role);
                window.location.href = role === 'admin' ? 'admindashboard.html' : 'loggedin.html';
            });
        </script>
    </body>
</html>
