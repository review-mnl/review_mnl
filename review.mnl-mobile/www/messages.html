<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages - review.mnl</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .messages-page-wrap {
            padding: 30px 4vw 44px;
            background: linear-gradient(180deg, #f6f8ff 0%, #eef3ff 100%);
            min-height: 74vh;
        }
        .messages-page-shell {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(250px, 340px) 1fr;
            gap: 16px;
            height: min(76vh, 740px);
        }
        .messages-page-card {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e5ecff;
            box-shadow: 0 14px 28px rgba(7, 37, 120, 0.12);
            overflow: hidden;
            min-height: 0;
        }
        .messages-page-list {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .messages-page-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-bottom: 1px solid #edf2ff;
            color: #0d1b4b;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        #msgPageThreads {
            padding: 8px 12px 12px;
            overflow-y: auto;
            min-height: 0;
        }
        .messages-page-main {
            display: flex;
            flex-direction: column;
            min-height: 0;
            position: relative;
        }
        #msgPageEmpty {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            color: #64748b;
            font-size: 14px;
            background: linear-gradient(180deg, #f9fbff 0%, #f3f7ff 100%);
        }
        #msgPageConvPanel {
            display: flex;
            flex-direction: column;
            min-height: 0;
            height: 100%;
            padding: 10px 12px 12px;
        }
        #msgPageBackBtn {
            display: none;
        }
        #msgPageStatus {
            margin: 8px 4px 0;
            font-size: 11px;
            color: #6b7280;
            min-height: 16px;
        }
        @media (max-width: 900px) {
            .messages-page-wrap {
                padding: 16px 12px 22px;
            }
            .messages-page-shell {
                grid-template-columns: 1fr;
                height: auto;
                min-height: 72vh;
            }
            .messages-page-card {
                min-height: 260px;
            }
            #msgPageBackBtn {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <section class="header header-userdashboard">
        <nav>
            <a href="loggedin.html" class="top-logo"><span class="logo-review">review</span><span class="logo-mnl">.mnl</span></a>
            <div class="nav-links">
                <ul>
                    <li><a href="loggedin.html">HOME</a></li>
                    <li><a href="messages.html">MESSAGES</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                    <li><a href="search.html">SEARCH</a></li>
                </ul>
            </div>
            <div class="profile-wrapper" style="position:relative;">
                <button id="profileBtn" class="profile-icon" aria-expanded="false" style="background:none;border:none;color:#fff;">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
                <div id="profileDropdown" class="profile-dropdown" style="display:none;position:absolute;right:0;top:42px;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.15);min-width:160px;overflow:hidden;z-index:1000;">
                    <a href="userdashboard.html" style="display:block;padding:12px 16px;color:#0a4cff;text-decoration:none;border-bottom:1px solid #eee;">My Profile</a>
                    <button id="logoutBtn" style="display:block;width:100%;padding:12px 16px;background:none;border:none;text-align:left;color:#333;cursor:pointer;">Logout</button>
                </div>
            </div>
        </nav>
        <div class="textbox">
            <h1>Messages</h1>
        </div>
    </section>

    <section class="messages-page-wrap">
        <div class="messages-page-shell">
            <aside id="msgPageListPanel" class="messages-page-card messages-page-list">
                <div class="messages-page-list-header">
                    <span>Conversations</span>
                    <span id="msgPageUnreadBadge" style="display:none;background:#d32f2f;color:#fff;border-radius:999px;padding:2px 8px;font-size:10px;font-weight:700;">0</span>
                </div>
                <div id="msgPageThreads"></div>
            </aside>

            <main class="messages-page-card messages-page-main">
                <div id="msgPageEmpty">Select a conversation to start messaging.</div>
                <div id="msgPageConvPanel">
                    <div class="conv-header">
                        <button type="button" class="conv-back-btn" id="msgPageBackBtn">
                            <span class="material-symbols-outlined">arrow_back</span>
                        </button>
                        <span class="conv-name" id="msgPageConvName">Conversation</span>
                    </div>
                    <div class="conv-messages" id="msgPageMessages"></div>
                    <div id="msgPageAttachPreview" style="display:none;align-items:center;justify-content:space-between;gap:8px;margin:0 0 8px;padding:7px 9px;border:1px solid #dde6ff;border-radius:10px;background:#f7faff;font-size:12px;color:#1f2937;"></div>
                    <div class="conv-input-row">
                        <button type="button" id="msgPageAttachBtn" aria-label="Attach image or file" title="Attach image or file" style="border:1px solid #d7def5;background:#fff;color:#30428a;border-radius:10px;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 auto;">
                            <span class="material-symbols-outlined" style="font-size:20px;">attach_file</span>
                        </button>
                        <input type="file" id="msgPageAttachInput" accept="image/*,.pdf,.doc,.docx,.txt" style="display:none;">
                        <input type="text" id="msgPageInput" placeholder="Type a message...">
                        <button type="button" class="conv-send-btn" id="msgPageSendBtn">
                            <span class="material-symbols-outlined">send</span>
                        </button>
                    </div>
                    <p id="msgPageStatus"></p>
                </div>
            </main>
        </div>
    </section>

    <script src="api.js"></script>
    <script>
        (function() {
            if (!isAuthenticated()) {
                window.location.href = 'login.html';
                return;
            }

            var user = getUser() || {};
            var role = String(user.role || '').toLowerCase();
            if (role !== 'student') {
                if (role === 'review_center' || role === 'admin' || role === 'center') {
                    window.location.replace('center-messages.html' + window.location.search);
                } else {
                    window.location.replace('index.html');
                }
                return;
            }

            var profileBtn = document.getElementById('profileBtn');
            var profileDd = document.getElementById('profileDropdown');
            var logout = document.getElementById('logoutBtn');

            if (profileBtn && profileDd) {
                profileBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    var isOpen = profileDd.style.display === 'block';
                    profileDd.style.display = isOpen ? 'none' : 'block';
                    profileBtn.setAttribute('aria-expanded', String(!isOpen));
                });
                document.addEventListener('click', function() {
                    profileDd.style.display = 'none';
                    profileBtn.setAttribute('aria-expanded', 'false');
                });
            }

            if (logout) {
                logout.addEventListener('click', function() {
                    clearSession();
                    window.location.href = 'index.html';
                });
            }

            initFullMessagesPage({
                conversationFallbackName: 'Review Center',
                noMessagesText: 'No messages yet.',
                emptyHintText: 'Select a review center conversation to start messaging.',
            });
        })();
    </script>
</body>
</html>
