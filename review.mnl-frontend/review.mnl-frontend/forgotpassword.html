<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Forgot Password - Review.Mnl</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <style>
            .forgot-page {
                min-height: 100vh;
                background-image: url(images/bg.png);
                background-position: center;
                background-size: cover;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            .forgot-page::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 67, 207, 0.3);
                z-index: 1;
            }

            .forgot-nav {
                padding: 2% 6%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: linear-gradient(rgba(0,0,0,0.2), transparent);
                position: relative;
                z-index: 2;
            }

            .forgot-nav img {
                width: 150px;
            }

            .forgot-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                position: relative;
                z-index: 2;
            }

            .forgot-form {
                background: #fff;
                border-radius: 20px;
                padding: 60px 50px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
                text-align: center;
            }

            .forgot-form h2 {
                color: #0043CF;
                font-size: 21px;
                margin-bottom: 15px;
                font-weight: 600;
            }

            .forgot-form p {
                color: #666;
                font-size: 11px;
                margin-bottom: 30px;
                line-height: 1.6;
            }

            .form-group {
                margin-bottom: 20px;
                text-align: left;
            }

            .form-group label {
                display: block;
                color: #0043CF;
                font-weight: 500;
                margin-bottom: 8px;
                font-size: 10px;
            }

            .form-group input {
                width: 100%;
                padding: 9px 10px;
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                font-size: 11px;
                font-family: 'Poppins', sans-serif;
                transition: border-color 0.3s ease;
                box-sizing: border-box;
            }

            .form-group input:focus {
                outline: none;
                border-color: #0043CF;
            }

            .submit-btn {
                width: 100%;
                padding: 9px;
                background-color: #0043CF;
                color: #fff;
                border: none;
                border-radius: 50px;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                font-family: 'Poppins', sans-serif;
                transition: background-color 0.3s ease;
                margin-bottom: 15px;
            }

            .submit-btn:hover {
                background-color: #0035a3;
            }

            .back-link {
                text-align: center;
                color: #666;
                font-size: 14px;
            }

            .back-link a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 600;
            }

            .back-link a:hover {
                text-decoration: underline;
            }

            .icon {
                font-size: 50px;
                color: #0043CF;
                margin-bottom: 15px;
            }
        </style>
    </head>
    <body>
        <div class="forgot-page">
            <nav class="forgot-nav">
                <a href="index.html" class="top-logo"><span class="logo-review">review</span><span class="logo-mnl">.mnl</span></a>
                <div></div>
            </nav>

            <div class="forgot-container">
                <form class="forgot-form">
                    <div class="icon">🔐</div>
                    
                    <h2>Reset Password</h2>
                    <p>Enter your email address and we'll send you instructions to reset your password.</p>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email address" required>
                    </div>

                    <button type="submit" class="submit-btn">SEND RESET LINK</button>

                    <div class="back-link">
                        Remember your password? <a href="login.html">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
