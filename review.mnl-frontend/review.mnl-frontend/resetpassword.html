<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Reset Password - review.mnl</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <style>
            .reset-page {
                min-height: 100vh;
                background-image: url(images/bg.png);
                background-position: center;
                background-size: cover;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            .reset-page::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 67, 207, 0.3);
                z-index: 1;
            }

            .reset-nav {
                padding: 2% 6%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: linear-gradient(rgba(0,0,0,0.2), transparent);
                position: relative;
                z-index: 2;
            }

            .reset-nav img {
                width: 150px;
            }

            .reset-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                position: relative;
                z-index: 2;
            }

            .reset-form {
                background: #fff;
                border-radius: 20px;
                padding: 60px 50px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
                text-align: center;
            }

            .reset-form h2 {
                color: #0043CF;
                font-size: 21px;
                margin-bottom: 15px;
                font-weight: 600;
            }

            .reset-form p {
                color: #666;
                font-size: 11px;
                margin-bottom: 30px;
                line-height: 1.6;
            }

            .form-group {
                margin-bottom: 20px;
                text-align: left;
            }

            .form-group label {
                display: block;
                color: #0043CF;
                font-weight: 500;
                margin-bottom: 8px;
                font-size: 10px;
            }

            .form-group input {
                width: 100%;
                padding: 9px 10px;
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                font-size: 11px;
                font-family: 'Poppins', sans-serif;
                transition: border-color 0.3s ease;
                box-sizing: border-box;
            }

            .form-group input:focus {
                outline: none;
                border-color: #0043CF;
            }

            .submit-btn {
                width: 100%;
                padding: 9px;
                background-color: #0043CF;
                color: #fff;
                border: none;
                border-radius: 50px;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                font-family: 'Poppins', sans-serif;
                transition: background-color 0.3s ease;
                margin-bottom: 15px;
            }

            .submit-btn:hover {
                background-color: #0035a3;
            }

            .back-link {
                text-align: center;
                color: #666;
                font-size: 14px;
            }

            .back-link a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 600;
            }

            .back-link a:hover {
                text-decoration: underline;
            }

            .icon {
                font-size: 50px;
                color: #0043CF;
                margin-bottom: 15px;
            }

            .password-requirements {
                font-size: 10px;
                color: #888;
                text-align: left;
                margin-top: 5px;
            }
        </style>
    </head>
    <body>
        <div class="reset-page">
            <nav class="reset-nav">
                <a href="index.html" class="top-logo"><span class="logo-review">review</span><span class="logo-mnl">.mnl</span></a>
                <div></div>
            </nav>

            <div class="reset-container">
                <form class="reset-form" id="resetForm">
                    <div class="icon">🔑</div>
                    
                    <h2>Create New Password</h2>
                    <p>Enter your new password below. Make sure it's at least 8 characters.</p>

                    <div class="form-group">
                        <label for="password">New Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter new password" required minlength="8">
                        <p class="password-requirements">At least 8 characters</p>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
                    </div>

                    <p id="resetError" style="display:none;color:#d32f2f;font-size:11px;margin-bottom:10px;"></p>
                    <p id="resetSuccess" style="display:none;color:#2e7d32;font-size:11px;margin-bottom:10px;"></p>
                    <button type="submit" class="submit-btn">RESET PASSWORD</button>

                    <div class="back-link">
                        <a href="login.html">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
        <script src="api.js"></script>
        <script>
            // Get token from URL
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (!token) {
                document.getElementById('resetError').textContent = 'Invalid reset link. Please request a new one.';
                document.getElementById('resetError').style.display = 'block';
                document.querySelector('.submit-btn').disabled = true;
            }

            document.getElementById('resetForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const errEl = document.getElementById('resetError');
                const okEl = document.getElementById('resetSuccess');
                const btn = document.querySelector('.submit-btn');

                errEl.style.display = 'none';
                okEl.style.display = 'none';

                // Validate passwords match
                if (password !== confirmPassword) {
                    errEl.textContent = 'Passwords do not match.';
                    errEl.style.display = 'block';
                    return;
                }

                // Validate password length
                if (password.length < 8) {
                    errEl.textContent = 'Password must be at least 8 characters.';
                    errEl.style.display = 'block';
                    return;
                }

                btn.disabled = true;
                btn.textContent = 'Resetting...';

                try {
                    await AuthAPI.resetPassword(token, password);
                    okEl.textContent = 'Password reset successfully! Redirecting to login...';
                    okEl.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } catch (err) {
                    errEl.textContent = err.message || 'Failed to reset password.';
                    errEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'RESET PASSWORD';
                }
            });
        </script>
    </body>
</html>
