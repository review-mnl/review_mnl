<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up - Review.Mnl</title>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
        <style>
            .signup-page {
                min-height: 100vh;
                background-image: url(images/bg.png);
                background-position: center;
                background-size: cover;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            .signup-page::before {
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0, 67, 207, 0.3);
                z-index: 1;
            }

            .signup-nav {
                padding: 2% 6%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: linear-gradient(rgba(0,0,0,0.2), transparent);
                position: relative;
                z-index: 2;
            }

            .signup-nav img {
                width: 150px;
            }

            .signup-container {
                flex: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                position: relative;
                z-index: 2;
            }

            .signup-form {
                background: #fff;
                border-radius: 20px;
                padding: 60px 50px;
                width: 100%;
                max-width: 450px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
                max-height: 90vh;
                overflow-y: auto;
            }

            .signup-form h2 {
                color: #0043CF;
                font-size: 21px;
                margin-bottom: 10px;
                font-weight: 600;
            }

            .signup-form p {
                color: #666;
                font-size: 11px;
                margin-bottom: 30px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                color: #0043CF;
                font-weight: 500;
                margin-bottom: 8px;
                font-size: 10px;
            }

            .form-group input {
                width: 100%;
                padding: 9px 10px;
                border: 2px solid #e0e0e0;
                border-radius: 12px;
                font-size: 11px;
                font-family: 'Poppins', sans-serif;
                transition: border-color 0.3s ease;
                box-sizing: border-box;
            }

            .form-group input:focus {
                outline: none;
                border-color: #0043CF;
            }

            .signup-btn {
                width: 100%;
                padding: 9px;
                background-color: #0043CF;
                color: #fff;
                border: none;
                border-radius: 50px;
                font-size: 11px;
                font-weight: 600;
                cursor: pointer;
                font-family: 'Poppins', sans-serif;
                transition: background-color 0.3s ease;
                margin-bottom: 15px;
            }

            .signup-btn:hover {
                background-color: #0035a3;
            }

            .divider {
                display: flex;
                align-items: center;
                margin: 25px 0;
                color: #999;
            }

            .divider::before,
            .divider::after {
                content: '';
                flex: 1;
                height: 1px;
                background: #e0e0e0;
            }

            .divider span {
                margin: 0 10px;
                font-size: 13px;
            }

            .social-login {
                display: flex;
                gap: 15px;
                margin-bottom: 20px;
            }

            .social-btn {
                flex: 1;
                padding: 12px;
                border: 2px solid #e0e0e0;
                background: #f9f9f9;
                border-radius: 12px;
                cursor: pointer;
                font-size: 24px;
                transition: all 0.3s ease;
                font-family: 'Poppins', sans-serif;
            }

            .social-btn:hover {
                border-color: #0043CF;
                background: #f0f5ff;
            }

            .login-link {
                text-align: center;
                color: #666;
                font-size: 14px;
            }

            .login-link a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 600;
            }

            .login-link a:hover {
                text-decoration: underline;
            }

            .terms-check {
                font-size: 13px;
                color: #666;
                margin-bottom: 20px;
            }

            .terms-check a {
                color: #0043CF;
                text-decoration: none;
                font-weight: 500;
            }
        </style>
    </head>
    <body>
        <div class="signup-page">
            <nav class="signup-nav">
                <a href="index.html" class="top-logo"><span class="logo-text">review.mnl</span></a>
                <div></div>
            </nav>

            <div class="signup-container">
                <form class="signup-form">
                    <h2>Sign Up</h2>
                    <p>Create your review.mnl account</p>

                    <div class="social-login">
                        <button type="button" class="social-btn" title="Sign up with Google"><i class="fab fa-google"></i></button>
                        <button type="button" class="social-btn" title="Sign up with Facebook"><i class="fab fa-facebook-f"></i></button>
                    </div>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Confirm your password" required>
                    </div>

                    <div class="terms-check">
                        <input type="checkbox" name="terms" required> I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>
                    </div>

                    <button type="submit" class="signup-btn">CREATE ACCOUNT</button>

                    <div class="login-link">
                        Already have an account? <a href="login.html">Login here</a>
                    </div>
                </form>
            </div>
        </div>
    </body>
</html>
