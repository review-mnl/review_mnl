<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - review.mnl</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        .notif-page-wrap {
            max-width: 980px;
            margin: 28px auto 40px;
            padding: 0 16px;
        }
        .notif-page-head {
            background: #ffffff;
            color: #0f172a;
            border: 1px solid #dbe4ff;
            border-radius: 16px;
            padding: 18px 20px;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.12);
            margin-bottom: 16px;
        }
        .notif-page-head h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .notif-page-head p {
            margin: 6px 0 0;
            font-size: 0.92rem;
            color: #475569;
        }
        .notif-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin: 12px 0 14px;
        }
        .notif-toolbar .count {
            font-size: 0.95rem;
            color: #1f2937;
            font-weight: 600;
            background: #e8eeff;
            border: 1px solid #cfdcff;
            border-radius: 999px;
            padding: 6px 10px;
        }
        .notif-btn {
            border: 1px solid #c9d5ff;
            background: #fff;
            color: #1d4ed8;
            padding: 8px 12px;
            border-radius: 9px;
            font-size: 0.84rem;
            font-weight: 600;
            cursor: pointer;
        }
        .notif-btn:hover {
            background: #f6f9ff;
        }
        .notif-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .notif-item {
            border: 1px solid #e5e7eb;
            background: #fff;
            border-radius: 12px;
            padding: 12px;
        }
        .notif-item.unread {
            border-color: #b9d0ff;
            background: #f5f9ff;
        }
        .notif-row {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
        }
        .notif-message {
            margin: 0;
            font-size: 0.92rem;
            color: #111827;
            line-height: 1.45;
            font-weight: 500;
        }
        .notif-item.unread .notif-message {
            font-weight: 700;
        }
        .notif-status {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 9px;
            border-radius: 999px;
            white-space: nowrap;
        }
        .notif-meta {
            margin-top: 9px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .notif-date {
            font-size: 0.78rem;
            color: #6b7280;
        }
        .notif-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .notif-empty {
            background: #fff;
            border: 1px dashed #cfd8ea;
            border-radius: 12px;
            padding: 22px;
            text-align: center;
            color: #6b7280;
            font-size: 0.92rem;
        }
        @media (max-width: 680px) {
            .notif-row {
                flex-direction: column;
            }
            .notif-status {
                align-self: flex-start;
            }
            .notif-meta {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <section class="header header-loggedin">
        <nav>
            <a href="loggedin.html" class="top-logo"><span class="logo-review">review</span><span class="logo-mnl">.mnl</span></a>
            <div class="nav-links">
                <ul>
                    <li><a href="loggedin.html">HOME</a></li>
                    <li><a href="search.html">VIEW REVIEW CENTERS</a></li>
                    <li><a href="contact.html">CONTACT</a></li>
                    <li><a href="search.html">SEARCH</a></li>
                </ul>
            </div>
            <div class="profile-wrapper" style="position:relative;">
                <button id="profileBtn" class="profile-icon" aria-expanded="false" style="background:none;border:none;color:#fff;">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
                <div id="profileDropdown" class="profile-dropdown" style="display:none;position:absolute;right:0;top:42px;background:#fff;border-radius:8px;box-shadow:0 6px 18px rgba(0,0,0,0.15);min-width:160px;overflow:hidden;z-index:1000;">
                    <a href="userdashboard.html" style="display:block;padding:12px 16px;color:#0a4cff;text-decoration:none;border-bottom:1px solid #eee;">My Profile</a>
                    <button id="logoutBtn" style="display:block;width:100%;padding:12px 16px;background:none;border:none;text-align:left;color:#333;cursor:pointer;">Logout</button>
                </div>
            </div>
        </nav>
    </section>

    <section class="body" style="min-height:55vh;background:rgba(245,248,255,0.96);">
        <div class="notif-page-wrap">
            <div class="notif-page-head">
                <h1>Enrollment Notifications</h1>
                <p>Realtime updates for your enrollment applications and center responses.</p>
            </div>

            <div class="notif-toolbar">
                <span class="count" id="notifSummary">Loading notifications...</span>
                <button type="button" class="notif-btn" id="notifRefreshBtn">Refresh</button>
            </div>

            <div class="notif-list" id="notifList"></div>
        </div>
    </section>

    <section class="footer">
        <div class="footer-container">
            <div class="footer-left">
                <h2>review.mnl</h2>
                <p>Manila, Philippines</p>
            </div>
            <div class="footer-center">
                <div class="footer-column">
                    <a href="loggedin.html">Home</a>
                    <a href="search.html">Review Centers</a>
                    <a href="contact.html">Contact</a>
                </div>
                <div class="footer-column">
                    <a href="search.html">Search</a>
                    <a href="userdashboard.html">Dashboard</a>
                </div>
            </div>
            <div class="footer-right">
                <a href="#" class="social-icon">f</a>
                <a href="#" class="social-icon">in</a>
                <a href="#" class="social-icon">▶</a>
                <a href="#" class="social-icon">✉</a>
            </div>
        </div>
    </section>

    <script src="api.js"></script>
    <script>
        if (!isAuthenticated()) {
            window.location.href = 'login.html';
        }

        (function() {
            const btn = document.getElementById('profileBtn');
            const dd = document.getElementById('profileDropdown');
            const logout = document.getElementById('logoutBtn');
            if (!btn || !dd) return;
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                const isOpen = dd.style.display === 'block';
                dd.style.display = isOpen ? 'none' : 'block';
                btn.setAttribute('aria-expanded', String(!isOpen));
            });
            logout.addEventListener('click', function() {
                clearSession();
                window.location.href = 'index.html';
            });
            document.addEventListener('click', function() {
                dd.style.display = 'none';
                btn.setAttribute('aria-expanded', 'false');
            });
        })();

        initGlobalNotificationBell();

        (function() {
            const listEl = document.getElementById('notifList');
            const summaryEl = document.getElementById('notifSummary');
            const refreshBtn = document.getElementById('notifRefreshBtn');
            let source = null;
            let fallbackTimer = null;

            function escapeHtml(str) {
                return String(str || '').replace(/[&<>"']/g, function(ch) {
                    return ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[ch];
                });
            }

            function statusStyle(status) {
                var s = String(status || 'pending').toLowerCase();
                return {
                    text: s.charAt(0).toUpperCase() + s.slice(1),
                    bg: s === 'approved' ? '#e8f5e9' : (s === 'rejected' ? '#ffebee' : '#e3f2fd'),
                    color: s === 'approved' ? '#1b5e20' : (s === 'rejected' ? '#b71c1c' : '#0d47a1')
                };
            }

            async function markRead(id) {
                try { await NotificationAPI.markAsRead(id); } catch (e) {}
            }

            function attachHandlers() {
                listEl.querySelectorAll('[data-action="mark-read"]').forEach(function(btn) {
                    btn.addEventListener('click', async function() {
                        var id = Number(btn.getAttribute('data-id') || 0);
                        if (id > 0) {
                            await markRead(id);
                            await load();
                        }
                    });
                });

                listEl.querySelectorAll('[data-action="open-chat"]').forEach(function(btn) {
                    btn.addEventListener('click', async function() {
                        var id = Number(btn.getAttribute('data-id') || 0);
                        if (id > 0) {
                            await markRead(id);
                            window.location.href = 'userdashboard.html?openChatNotification=' + id;
                        }
                    });
                });
            }

            function render(items) {
                var data = Array.isArray(items) ? items : [];
                var unread = data.filter(function(n) { return !n.is_read; }).length;
                summaryEl.textContent = data.length + ' total notifications • ' + unread + ' unread';

                if (!data.length) {
                    listEl.innerHTML = '<div class="notif-empty">No enrollment notifications yet.</div>';
                    return;
                }

                listEl.innerHTML = data.map(function(item) {
                    var isUnread = !item.is_read;
                    var st = statusStyle(item.status);
                    return ''
                        + '<div class="notif-item ' + (isUnread ? 'unread' : '') + '">'
                        + '  <div class="notif-row">'
                        + '    <p class="notif-message">' + escapeHtml(item.message || '') + '</p>'
                        + '    <span class="notif-status" style="background:' + st.bg + ';color:' + st.color + ';">' + st.text + '</span>'
                        + '  </div>'
                        + '  <div class="notif-meta">'
                        + '    <span class="notif-date">' + new Date(item.created_at).toLocaleString(undefined, { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) + '</span>'
                        + '    <div class="notif-actions">'
                        + (isUnread
                            ? '<button type="button" class="notif-btn" data-action="mark-read" data-id="' + Number(item.notification_id || 0) + '">Mark as Read</button>'
                            : '<span style="font-size:12px;color:#6b7280;font-weight:600;">Read</span>')
                        + (item.center_user_id
                            ? '<button type="button" class="notif-btn" data-action="open-chat" data-id="' + Number(item.notification_id || 0) + '">Open Chat</button>'
                            : '')
                        + '    </div>'
                        + '  </div>'
                        + '</div>';
                }).join('');

                attachHandlers();
            }

            async function load() {
                try {
                    var res = await NotificationAPI.getMy();
                    render((res && res.notifications) ? res.notifications : []);
                } catch (e) {
                    summaryEl.textContent = 'Unable to load notifications right now.';
                    listEl.innerHTML = '<div class="notif-empty">Please try again in a moment.</div>';
                }
            }

            function ensureFallbackPolling() {
                if (fallbackTimer) return;
                fallbackTimer = setInterval(load, 8000);
            }

            function stopFallbackPolling() {
                if (!fallbackTimer) return;
                clearInterval(fallbackTimer);
                fallbackTimer = null;
            }

            function startRealtime() {
                if (typeof window.EventSource === 'undefined') {
                    ensureFallbackPolling();
                    return;
                }

                var token = localStorage.getItem('token') || '';
                if (!token) {
                    ensureFallbackPolling();
                    return;
                }

                if (source) {
                    try { source.close(); } catch (e) {}
                }

                source = new EventSource(API_BASE_URL + '/api/notifications/stream?token=' + encodeURIComponent(token));

                source.onopen = function() {
                    stopFallbackPolling();
                };

                source.onmessage = function(ev) {
                    if (!ev || !ev.data) return;
                    try {
                        var payload = JSON.parse(ev.data);
                        if (payload && payload.type !== 'connected') {
                            load();
                        }
                    } catch (e) {
                        load();
                    }
                };

                source.onerror = function() {
                    ensureFallbackPolling();
                    try { source.close(); } catch (e) {}
                    source = null;
                    setTimeout(startRealtime, 3000);
                };
            }

            refreshBtn.addEventListener('click', load);
            load();
            startRealtime();

            window.addEventListener('beforeunload', function() {
                if (source) {
                    try { source.close(); } catch (e) {}
                    source = null;
                }
                stopFallbackPolling();
            });
        })();
    </script>
</body>
</html>
